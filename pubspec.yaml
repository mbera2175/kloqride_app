name: kloqride
description: KloqRide - India's Ride Hailing & Delivery App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  dio: ^5.4.0
  provider: ^6.1.2
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  go_router: ^13.2.0
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  google_maps_flutter: ^2.6.0
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  intl_phone_field: ^3.2.0
  pinput: ^3.0.0
  intl: ^0.19.0
  url_launcher: ^6.2.6
  image_picker: ^1.0.7
  permission_handler: ^11.3.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
